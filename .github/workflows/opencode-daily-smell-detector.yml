name: OpenCode Daily Smell Detector

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze (from merge detector)'
        required: false
        type: string

jobs:
  review-smells:
    if: github.ref == 'refs/heads/master' || github.event.inputs.pr_number != ''
    timeout-minutes: 10
    concurrency:
      group: ${{ github.event.inputs.pr_number && format('pr-smell-{0}', github.event.inputs.pr_number) || 'daily-smell-review' }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Fresh Commits
        id: check_changes
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            echo "PR-specific analysis requested. Forcing run."
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing analysis to run."
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            RECENT_COMMITS=$(git log --since="25 hours ago" --oneline)
            if [ -z "$RECENT_COMMITS" ]; then
              echo "No new commits found on master in the last 24 hours. Skipping run."
              echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            else
              echo "Fresh commits detected! Initializing code smell review."
              echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Read prompt
        if: steps.check_changes.outputs.SHOULD_RUN == 'true'
        id: prompt
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            echo "PROMPT<<EOF" >> $GITHUB_OUTPUT
            echo "This analysis is for Pull Request #${{ github.event.inputs.pr_number }} which was just merged into master." >> $GITHUB_OUTPUT
            cat .github/prompts/code-smell-review.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "PROMPT<<EOF" >> $GITHUB_OUTPUT
            cat .github/prompts/code-smell-review-master.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Analyze Code Smells with Mimo 2.5
        if: steps.check_changes.outputs.SHOULD_RUN == 'true'
        uses: anomalyco/opencode/github@v1.17.13
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        with:
          model: opencode-go/mimo-v2.5
          use_github_token: true
          prompt: ${{ steps.prompt.outputs.PROMPT }}
