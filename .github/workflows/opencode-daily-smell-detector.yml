name: OpenCode Daily Smell Detector

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  review-master:
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 10
    concurrency:
      group: daily-smell-review
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Fresh Commits
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing analysis to run."
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            RECENT_COMMITS=$(git log --since="25 hours ago" --oneline)
            if [ -z "$RECENT_COMMITS" ]; then
              echo "No new commits found on master in the last 24 hours. Skipping run."
              echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            else
              echo "Fresh commits detected! Initializing code smell review."
              echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Read prompt
        if: steps.check_changes.outputs.SHOULD_RUN == 'true'
        id: prompt
        run: echo "PROMPT<<EOF" >> $GITHUB_OUTPUT && cat .github/prompts/code-smell-review-master.md >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze Code Smells with Mimo 2.5
        if: steps.check_changes.outputs.SHOULD_RUN == 'true'
        uses: anomalyco/opencode/github@v1.17.13
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        with:
          model: opencode-go/mimo-v2.5
          use_github_token: true
          prompt: ${{ steps.prompt.outputs.PROMPT }}
