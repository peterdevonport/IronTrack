name: OpenCode Merge Detector

on:
  push:
    branches: [master]

jobs:
  chain-review:
    if: contains(github.event.head_commit.message, 'Merge pull request')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger smell detector for merged PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM=$(git log -1 --format="%s" | sed -n 's/.*#\([0-9]*\).*/\1/p')
          echo "Merged PR #$PR_NUM detected. Triggering code smell analysis..."
          gh workflow run opencode-daily-smell-detector.yml \
            --ref master \
            -f pr_number="$PR_NUM"
