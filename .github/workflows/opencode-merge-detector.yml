name: OpenCode Merge Detector

on:
  pull_request:
    types: [closed]

jobs:
  chain-review:
    if: github.event.pull_request.merged == true
    timeout-minutes: 5
    concurrency:
      group: merge-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      actions: write
    steps:
      - name: Close issue or trigger smell detector for merged PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          if echo "$LABELS" | jq -e '.[] | select(.name == "auto-fix")' > /dev/null 2>&1; then
            ISSUE_NUM=$(echo "$BRANCH" | sed -n 's/opencode\/fix-issue-\([0-9]*\).*/\1/p')
            if [ -n "$ISSUE_NUM" ]; then
              echo "Fixer PR #$PR_NUM merged — closing issue #$ISSUE_NUM."
              gh issue close "$ISSUE_NUM" --comment "Fixed — PR #$PR_NUM was merged."
            else
              echo "Fixer PR #$PR_NUM merged — could not extract issue number from branch $BRANCH."
            fi
            exit 0
          fi

          echo "Merged PR #$PR_NUM detected. Triggering code smell analysis..."
          gh workflow run opencode-daily-smell-detector.yml \
            --ref master \
            -f pr_number="$PR_NUM"
