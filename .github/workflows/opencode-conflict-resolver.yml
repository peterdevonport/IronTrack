name: OpenCode Conflict Resolver

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'The PR number to resolve'
        required: true
      branch_name:
        description: 'The branch name to fix'
        required: true

jobs:
  resolve-conflict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_MERGE_PAT }}
          ref: ${{ github.event.inputs.branch_name }}

      # Cache the OpenCode CLI binary across runs to avoid re-downloading
      # on every conflict resolution. The cache key is pinned to the CLI
      # version in resolve-conflicts.sh so that cache invalidates when
      # the version is bumped.
      - name: Cache OpenCode CLI
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-cli-1.18.3-${{ runner.os }}-${{ runner.arch }}

      - name: Resolve Conflicts (Merge, Lint, Test, Push)
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: .github/scripts/resolve-conflicts.sh \
          ${{ github.event.inputs.pr_number }} \
          ${{ github.event.inputs.branch_name }}
