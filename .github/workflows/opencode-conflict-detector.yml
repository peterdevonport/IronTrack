name: OpenCode Conflict Detector

on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["CI Test Suite"] # 👈 Make sure this matches your actual test workflow name string
    types:
      - completed

jobs:
  evaluate-queue:
    runs-on: ubuntu-latest
    steps:
      # 🛡️ FIX: This pulls down the repository context so the 'gh' CLI knows where it is
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Evaluate PR Pool Status
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        run: |
          # Fetch all open OpenCode PRs with their conflict status and latest CI test conclusion
          PR_LIST=$(gh pr list -S "head:opencode/fix-issue" --state open --json number,headRefName,mergeable,statusCheckRollup --jq '.[] | {number, branch: .headRefName, mergeable, conclusion: (.statusCheckRollup[-1].conclusion // null), status: (.statusCheckRollup[-1].status // null)} | @base64')

          if [ -z "$PR_LIST" ]; then
            echo "✅ No open OpenCode PRs found in the system."
            exit 0
          fi

          # Evaluate the board sequentially (lowest PR number runs first)
          for row in $PR_LIST; do
            DECODED=$(echo "$row" | base64 --decode)
            PR_NUM=$(echo "$DECODED" | jq -r '.number')
            BRANCH=$(echo "$DECODED" | jq -r '.branch')
            MERGEABLE=$(echo "$DECODED" | jq -r '.mergeable')
            CONCLUSION=$(echo "$DECODED" | jq -r '.conclusion')
            STATUS=$(echo "$DECODED" | jq -r '.status')

            echo "Checking status of PR #$PR_NUM ($BRANCH)..."

            # RULE 1: If this PR is currently running tests, skip it and check the next one.
            if [ "$STATUS" = "IN_PROGRESS" ]; then
              echo "⏳ PR #$PR_NUM is currently executing CI checks. Skipping for now..."
              continue
            fi

            # RULE 2: If the AI already tried to fix this PR but it failed your test suite, skip it.
            if [ "$CONCLUSION" = "FAILURE" ]; then
              echo "❌ PR #$PR_NUM has failed CI checks. Skipping to avoid stalling the queue."
              continue
            fi

            # RULE 3: If the PR is conflicting and ready to merge, deploy the worker to fix it.
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "🚨 PR #$PR_NUM is blocked by conflicts. Spawning dedicated Resolver..."
              
              gh workflow run opencode-conflict-resolver.yml \
                -f pr_number="$PR_NUM" \
                -f branch_name="$BRANCH"
              
              continue
            fi
          done

          echo "✅ All open PRs are either perfectly healthy or already merged."
