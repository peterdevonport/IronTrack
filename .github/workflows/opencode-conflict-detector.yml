name: PR Conflict Detector

on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["CI Test Suite"] # 👈 Make sure this matches your actual test workflow name string
    types:
      - completed

concurrency:
  group: conflict-detector
  cancel-in-progress: true

jobs:
  evaluate-queue:
    runs-on: ubuntu-latest
    steps:
      # 🛡️ FIX: This pulls down the repository context so the 'gh' CLI knows where it is
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Evaluate PR Pool Status
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        run: .github/scripts/evaluate-pr-queue.sh
