name: OpenCode Conflict Detector

on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["CI Test Suite"] # 👈 Make sure this matches your actual test workflow name string
    types:
      - completed

jobs:
  evaluate-queue:
    runs-on: ubuntu-latest
    steps:
      # 🛡️ FIX: This pulls down the repository context so the 'gh' CLI knows where it is
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Evaluate PR Pool Status
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        run: |
          # Fetch all open OpenCode PRs with their conflict status and CI test conclusions
          PR_LIST=$(gh pr list --head "opencode/fix-issue-" --state open --json number,headRefName,mergeable,statusCheckRollup --jq '.[] | {number, branch: .headRefName, mergeable, conclusion: .statusCheckRollup.conclusion, status: .statusCheckRollup.status} | @base64')

          if [ -z "$PR_LIST" ]; then
            echo "✅ No open OpenCode PRs found in the system."
            exit 0
          fi

          # Evaluate the board sequentially (lowest PR number runs first)
          for row in $PR_LIST; do
            __decode() { echo ${row} | base64 --decode; }
            PR_NUM=$(__decode | jq -r '.number')
            BRANCH=$(__decode | jq -r '.branch')
            MERGEABLE=$(__decode | jq -r '.mergeable')
            CONCLUSION=$(__decode | jq -r '.conclusion')
            STATUS=$(__decode | jq -r '.status')

            echo "Checking status of PR #$PR_NUM ($BRANCH)..."

            # RULE 1: If a PR is currently running tests, stop entirely. 
            if [ "$STATUS" = "IN_PROGRESS" ]; then
              echo "⏳ PR #$PR_NUM is currently executing CI checks. Standing down to avoid race conditions."
              exit 0
            fi

            # RULE 2: If the AI already tried to fix this PR but it failed your test suite, skip it.
            if [ "$CONCLUSION" = "FAILURE" ]; then
              echo "❌ PR #$PR_NUM has failed CI checks. Skipping to avoid stalling the queue."
              continue
            fi

            # RULE 3: If the PR is conflicting and clean, deploy the worker to fix it, then terminate the loop.
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "🚨 PR #$PR_NUM is blocked by conflicts. Spawning dedicated Resolver..."
              
              gh workflow run opencode-conflict-resolver.yml \
                -f pr_number="$PR_NUM" \
                -f branch_name="$BRANCH"
              
              exit 0
            fi
          done

          echo "✅ All open PRs are either perfectly healthy or already merged."
