name: OpenCode On-Demand Issue Fixer

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix manually'
        required: true

jobs:
  fix-issue:
    # 🛑 GUARD: Trigger on manual run, a "/fix" comment, OR an automated overnight issue containing your specific prefix
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && startsWith(github.event.comment.body, '/fix')) ||
      (github.event_name == 'issues' && contains(github.event.issue.title, '[OpenCode Technical Debt]'))
    
    runs-on: ubuntu-latest
    
    # 🔄 CONCURRENCY: Isolates runs per issue so batch inputs don't step on each other's toes
    concurrency:
      group: fix-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: true

    # 🔑 CLOUD PERMISSIONS: Core repository access scopes
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_MERGE_PAT }}

      # 🛡️ STEP 1: SECURITY GATE (Only blocks unauthorized human comments; safely skips for overnight automated issues)
      - name: Check User Permissions
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed("Unauthorized user attempted to trigger code fix automation.");
            }

      - name: Fetch Issue Context & Compile Prompt
        id: compile_context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.inputs.issue_number || github.event.issue.number }}"
          
          # Fetch issue details via GitHub CLI
          ISSUE_DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r .title)
          
          echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          # Build our intelligent scratchpad instruction file
          echo "You are an autonomous Senior Software Engineer evaluating an on-demand code refactor request." > open_code_prompt.txt
          echo "Target Issue: #$ISSUE_NUM - $ISSUE_TITLE" >> open_code_prompt.txt
          echo -e "\n### REFACTOR BLUEPRINT REPORTED:\n" >> open_code_prompt.txt
          echo "$ISSUE_DATA" | jq -r .body >> open_code_prompt.txt
          
          echo -e "\n### YOUR MISSION:" >> open_code_prompt.txt
          echo "Analyze the corresponding source files in the current repository. Determine if this reported code smell is a genuine defect/anti-pattern that needs correcting, OR if this structure is intentional (e.g., required for performance, compliance with third-party APIs, or an explicitly guarded architectural design)." >> open_code_prompt.txt
          
          echo -e "\n### EXECUTION DIRECTIONS (CHOOSE EXACTLY ONE PATH):" >> open_code_prompt.txt
          
          echo -e "\nPATH A: [VALID CODE SMELL - FIX IT]" >> open_code_prompt.txt
          echo "If the issue is correct and should be refactored:" >> open_code_prompt.txt
          echo "1. Checkout a new branch named 'opencode/fix-issue-$ISSUE_NUM'." >> open_code_prompt.txt
          echo "2. Apply precise modifications to the master branch files to resolve the tech debt." >> open_code_prompt.txt
          echo "3. Commit the changes, push the branch, and create a PR with title matching the issue title. Do NOT enable auto-merge — the workflow handles that." >> open_code_prompt.txt

          echo -e "\nPATH B: [INTENTIONAL DESIGN - REJECT IT]" >> open_code_prompt.txt
          echo "If you evaluate that the code is intentional, optimal, or should remain unchanged, do NOT edit any repository code. Run ONLY these two terminal commands to mark the issue as wontfix (they work regardless of which branch is checked out):" >> open_code_prompt.txt
          echo "1. gh issue edit $ISSUE_NUM --add-label \"wontfix\"" >> open_code_prompt.txt
          echo "2. gh issue comment $ISSUE_NUM --body \"### 🛑 Architectural Review: Intentional Design\nI have deeply analyzed the codebase regarding this report. I recommend **against** changing this code for the following reasons:\n\n<Provide a highly detailed, professional engineering justification explaining why this code pattern is correct, necessary, or optimal given your context.>\"" >> open_code_prompt.txt
          echo -e "\nCRITICAL: Do NOT create any branch, commit, push, or pull request. Do NOT edit any files. Run ONLY the two gh issue commands above. If you create a PR, the workflow will auto-merge it because it cannot distinguish wontfix PRs from real fixes." >> open_code_prompt.txt

      - name: Read generated prompt
        id: prompt
        run: echo "PROMPT<<EOF" >> $GITHUB_OUTPUT && cat open_code_prompt.txt >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "opencode-issue-fixer[bot]"
          git config --global user.email "opencode-issue-fixer[bot]@users.noreply.github.com"

      - name: Process Issue with OpenCode
        uses: anomalyco/opencode/github@v1.17.13
        timeout-minutes: 15
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        with:
          model: opencode-go/deepseek-v4-flash
          use_github_token: true
          prompt: ${{ steps.prompt.outputs.PROMPT }}

      # 🚀 STEP 2: FIND AND FINALIZE PR OR LABEL
      - name: Finalize PR or Label
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ steps.compile_context.outputs.ISSUE_NUM }}"

          # Check if the opencode action created a PR for this issue
          PR_URL=$(gh pr list --head "opencode/fix-issue-$ISSUE_NUM" --state open --json url --jq '.[0].url' 2>/dev/null)

          # Check if the AI chose Path B (wontfix)
          LABELS=$(gh issue view "$ISSUE_NUM" --json labels -q '.labels[].name' 2>/dev/null || echo "")
          IS_WONTFIX=$(echo "$LABELS" | grep -c "wontfix" || true)

          if [ -n "$PR_URL" ]; then
            echo "✅ OpenCode created a PR: $PR_URL"
            gh pr edit "$PR_URL" --add-label "auto-fix" 2>/dev/null || true

            if [ "$IS_WONTFIX" -gt 0 ]; then
              echo "Issue is marked wontfix — closing the PR and issue."
              gh pr close "$PR_URL" --comment "Closing — the AI determined this is an intentional design (wontfix)."
              gh issue close "$ISSUE_NUM" --comment "Closed — AI determined this is an intentional design (wontfix)."
            else
              echo "Enabling auto-merge for the PR."
              PR_NUM=$(echo "$PR_URL" | grep -oP '/pull/\K\d+')
              gh pr merge "$PR_URL" --auto --merge
            fi

            exit 0
          fi

          # No PR found — maybe it's a wontfix issue, or the push failed
          if [ "$IS_WONTFIX" -gt 0 ]; then
            echo "✅ Issue #$ISSUE_NUM marked wontfix — Path B completed. Closing issue."
            gh issue close "$ISSUE_NUM" --comment "Closed — AI determined this is an intentional design (wontfix)."

            # Close any stray dispatch PRs the AI may have created anyway
            DISPATCH_PR=$(gh pr list --head "opencode/dispatch-*" --state open --json headRefName,number --jq ".[] | select(.headRefName | test(\"$ISSUE_NUM\")) | .number" 2>/dev/null || echo "")
            if [ -n "$DISPATCH_PR" ]; then
              echo "Closing stray dispatch PR #$DISPATCH_PR."
              gh pr close "$DISPATCH_PR" --comment "Closing — AI chose wontfix but mistakenly created a PR."
            fi
            exit 0
          fi

          # Fail-safe: Neither PR nor wontfix label
          echo "::warning::Bot did not create a PR or mark issue as wontfix."
          gh issue comment "$ISSUE_NUM" --body \
            "### ⚠️ Bot Run Incomplete
            The auto-fixer workflow ([run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})) finished execution but did not output a fix branch or apply a 'wontfix' resolution strategy."
          gh issue edit "$ISSUE_NUM" --add-label "bot-failed"
